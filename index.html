<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FormMate AI — AI-Assisted Form Companion</title>
  <meta name="description"
    content="FormMate analyzes and helps you fill out complex forms automatically using AI. Paste any form URL and let AI do the work." />
  <meta name="keywords" content="form assistant, AI forms, auto-fill, form automation, FormMate" />
  <meta name="author" content="FormMate AI" />
  <meta property="og:title" content="FormMate AI — AI-Assisted Form Companion" />
  <meta property="og:description"
    content="Paste any form URL and let AI fill it out for you. Smart, fast, and accurate." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#2298da" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#4fafe7" media="(prefers-color-scheme: dark)" />

  <link rel="icon" type="image/png" href="/logo.png" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#2298da",
            "primary-light": "#4fafe7",
            "background-light": "#f6f6f8",
            "background-dark": "#0c0a14",
          },
          fontFamily: {
            "display": ["Inter", "system-ui", "sans-serif"]
          },
          borderRadius: {
            "none": "0",
            "sm": "0.75rem",
            "DEFAULT": "0.875rem",
            "md": "1rem",
            "lg": "1rem",
            "xl": "1.25rem",
            "2xl": "1.5rem",
            "3xl": "2rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>

  <link rel="stylesheet" href="/src/styles.css" />
</head>

<body class="font-display antialiased" style="background: var(--fm-bg); color: var(--fm-text);">
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
