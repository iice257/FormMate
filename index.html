<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FormMate — AI-Assisted Form Companion</title>
  <meta name="description"
    content="FormMate analyzes and helps you fill out complex forms automatically using AI. Paste any form URL and let AI do the work." />
  <meta name="keywords" content="form assistant, AI forms, auto-fill, form automation, FormMate" />
  <meta name="author" content="FormMate AI" />
  <meta property="og:title" content="FormMate — AI-Assisted Form Companion" />
  <meta property="og:description"
    content="Paste any form URL and let AI fill it out for you. Smart, fast, and accurate." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#5b13ec" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#8b5cf6" media="(prefers-color-scheme: dark)" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: "media",
      theme: {
        extend: {
          colors: {
            "primary": "#5b13ec",
            "primary-light": "#7c3aed",
            "background-light": "#f6f6f8",
            "background-dark": "#0c0a14",
          },
          fontFamily: {
            "display": ["Inter", "system-ui", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "2xl": "2rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>

  <link rel="stylesheet" href="/src/styles.css" />
</head>

<body class="font-display antialiased" style="background: var(--fm-bg); color: var(--fm-text);">
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
